name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build JAR
        run: ant jar -Dreference.PbmCommons.jar=lib/PbmCommons.jar -Dreference.PbmPersistenceCommons.jar=lib/PbmPersistenceCommons.jar -Dplatforms.JDK_21_Temurin.home=$JAVA_HOME
      - name: Run tests
        run: ant test -Dtest.haltonfailure=true -Dreference.PbmCommons.jar=lib/PbmCommons.jar -Dreference.PbmPersistenceCommons.jar=lib/PbmPersistenceCommons.jar -Dplatforms.JDK_21_Temurin.home=$JAVA_HOME
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test/results/
          if-no-files-found: ignore
          # Uploaded on every branch push; keep a short window (debug aid only) so it does not
          # accumulate against the Actions storage quota. Default is 90 days.
          retention-days: 7
