name: Build Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg-type: msi
            icon-ext: ico
          - os: macos-latest
            pkg-type: dmg
            icon-ext: icns
          - os: ubuntu-latest
            pkg-type: deb
            icon-ext: png

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Ant (macOS)
        if: runner.os == 'macOS'
        run: brew install ant

      - name: Install Ant (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ant --no-progress -y

      - name: Add WiX to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files (x86)/WiX Toolset v3.14/bin" >> "$GITHUB_PATH"

      - name: Build JAR
        shell: bash
        run: |
          ant jar \
            -Dreference.PbmCommons.jar=lib/PbmCommons.jar \
            -Dreference.PbmPersistenceCommons.jar=lib/PbmPersistenceCommons.jar \
            -Dplatforms.JDK_21_Temurin.home="$JAVA_HOME"

      - name: Copy dependency JARs into dist/lib
        shell: bash
        run: mkdir -p dist/lib && cp lib/*.jar dist/lib/

      - name: Package portable ZIP (Linux only — platform-independent)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p Counselor/dist/lib
          cp dist/PbmCounselor.jar Counselor/dist/
          cp dist/lib/*.jar Counselor/dist/lib/
          cp run.bat run.sh Counselor/
          mkdir -p installer
          zip -r installer/Counselor-portable.zip Counselor/

      - name: Generate ICO (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install pillow -q
          python -c "
          from PIL import Image
          img = Image.open('icon/icon.png').convert('RGBA')
          img.save('icon/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Generate ICNS (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p iconset.iconset
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz icon/icon.png --out iconset.iconset/icon_${sz}x${sz}.png
          done
          sips -z 32   32   icon/icon.png --out iconset.iconset/icon_16x16@2x.png
          sips -z 64   64   icon/icon.png --out iconset.iconset/icon_32x32@2x.png
          sips -z 256  256  icon/icon.png --out iconset.iconset/icon_128x128@2x.png
          sips -z 512  512  icon/icon.png --out iconset.iconset/icon_256x256@2x.png
          sips -z 1024 1024 icon/icon.png --out iconset.iconset/icon_512x512@2x.png
          iconutil -c icns iconset.iconset -o icon/icon.icns

      - name: Derive version
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          [[ "$VER" =~ ^[0-9] ]] || VER="0.0.0"
          echo "APP_VERSION=$VER" >> "$GITHUB_ENV"

      - name: Run jpackage (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p installer
          jpackage \
            --input dist \
            --dest installer \
            --name Counselor \
            --main-jar PbmCounselor.jar \
            --main-class client.Main \
            --type msi \
            --app-version "$APP_VERSION" \
            --vendor "Clash of Legends" \
            --add-modules java.desktop,java.sql,java.xml,java.naming,java.logging,java.management,jdk.unsupported \
            --java-options -Xmx512M \
            --java-options "-Dsun.java2d.d3d=false" \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.text=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED" \
            --icon icon/icon.${{ matrix.icon-ext }} \
            --file-associations jpackage/file-associations.properties \
            --win-dir-chooser \
            --win-shortcut

      - name: Run jpackage app-image (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p appimage
          jpackage \
            --input dist \
            --dest appimage \
            --name Counselor \
            --main-jar PbmCounselor.jar \
            --main-class client.Main \
            --type app-image \
            --app-version "$APP_VERSION" \
            --vendor "Clash of Legends" \
            --add-modules java.desktop,java.sql,java.xml,java.naming,java.logging,java.management,jdk.unsupported \
            --java-options -Xmx512M \
            --java-options "-Dsun.java2d.d3d=false" \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.text=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED" \
            --icon icon/icon.ico

      - name: ZIP app-image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path appimage/Counselor -DestinationPath installer/Counselor-windows-portable.zip

      - name: Run jpackage (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p installer
          jpackage \
            --input dist \
            --dest installer \
            --name Counselor \
            --main-jar PbmCounselor.jar \
            --main-class client.Main \
            --type ${{ matrix.pkg-type }} \
            --app-version "$APP_VERSION" \
            --vendor "Clash of Legends" \
            --add-modules java.desktop,java.sql,java.xml,java.naming,java.logging,java.management,jdk.unsupported \
            --java-options -Xmx512M \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.text=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED" \
            --icon icon/icon.${{ matrix.icon-ext }} \
            --file-associations jpackage/file-associations.properties

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: installer/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            installers/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Counselor $GITHUB_REF_NAME"
