name: Build Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg-type: msi
            icon-ext: ico
          - os: macos-latest
            pkg-type: dmg
            icon-ext: icns
          # macos-13 (Intel) leg removed 2026-06-14: GitHub is retiring Intel macOS runners, so the
          # job sat awaiting a runner for 24h and wedged the v2.1.877 release (release/bump-build
          # never ran). Intel-Mac users on macOS 11+ use the cross-platform portable JAR ZIP + Temurin 21.
          - os: ubuntu-latest
            pkg-type: deb
            icon-ext: png

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Ant (macOS)
        if: runner.os == 'macOS'
        run: brew install ant

      - name: Install Ant (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ant --no-progress -y

      - name: Add WiX to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files (x86)/WiX Toolset v3.14/bin" >> "$GITHUB_PATH"

      - name: Build JAR
        shell: bash
        run: |
          ant jar \
            -Dreference.PbmCommons.jar=lib/PbmCommons.jar \
            -Dreference.PbmPersistenceCommons.jar=lib/PbmPersistenceCommons.jar \
            -Dplatforms.JDK_21_Temurin.home="$JAVA_HOME"

      - name: Copy dependency JARs into dist/lib
        shell: bash
        run: |
          mkdir -p dist/lib dist/examples
          cp lib/*.jar dist/lib/
          cp examples/*.egf dist/examples/ 2>/dev/null || true
          cp splash/teaser_whs01.png dist/

      - name: Derive version
        shell: bash
        run: |
          # Installer version is derived from the build number, NOT the marketing tag, so it increases
          # on every release and every re-cut. Windows Installer only performs a major upgrade when
          # ProductVersion strictly increases; a tag-based version (e.g. "2.0.8") repeats across re-cuts
          # and never triggers an upgrade, leaving players stuck on stale binaries. 2.1.<build> stays
          # monotonic (build only grows via the bump-build job). Applies to all platforms.
          # NOTE: MSI ProductVersion micro field caps at 65535; revisit the scheme well before then.
          BUILD=$(unzip -p dist/PbmCounselor.jar version_counselor.properties | grep '^BUILD=' | cut -d= -f2 | tr -d '[:space:]')
          [ -n "$BUILD" ] || { echo "BUILD not found in built JAR"; exit 1; }
          echo "APP_VERSION=2.1.${BUILD}" >> "$GITHUB_ENV"

      - name: Package portable ZIP (Linux only — platform-independent)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p Counselor/dist/lib Counselor/dist/examples
          cp dist/PbmCounselor.jar Counselor/dist/
          cp dist/lib/*.jar Counselor/dist/lib/
          cp dist/examples/*.egf Counselor/dist/examples/ 2>/dev/null || true
          cp dist/teaser_whs01.png Counselor/dist/
          cp run.bat run.sh Counselor.command Counselor/
          chmod +x Counselor/run.sh Counselor/Counselor.command
          mkdir -p installer
          zip -r installer/Counselor-portable-${APP_VERSION}.zip Counselor/

      - name: Write Counselor version file (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Read BUILD from the built JAR (what the app actually reports), NOT from src/. The Ant
          # -pre-jar target bumps src/version_counselor.properties AFTER the resource was already
          # copied into the JAR at compile time, so src is one ahead of the shipped JAR. Reading src
          # here made the release title (e.g. 2.861) disagree with the installed app's About box (2.860).
          BUILD=$(unzip -p dist/PbmCounselor.jar version_counselor.properties | grep '^BUILD=' | cut -d= -f2 | tr -d '[:space:]')
          echo "2.${BUILD}" > installer/counselor_version.txt

      - name: Generate ICO (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pip install pillow -q
          python -c "
          from PIL import Image
          img = Image.open('icon/icon.png').convert('RGBA')
          img.save('icon/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Generate ICNS (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p iconset.iconset
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz icon/icon.png --out iconset.iconset/icon_${sz}x${sz}.png
          done
          sips -z 32   32   icon/icon.png --out iconset.iconset/icon_16x16@2x.png
          sips -z 64   64   icon/icon.png --out iconset.iconset/icon_32x32@2x.png
          sips -z 256  256  icon/icon.png --out iconset.iconset/icon_128x128@2x.png
          sips -z 512  512  icon/icon.png --out iconset.iconset/icon_256x256@2x.png
          sips -z 1024 1024 icon/icon.png --out iconset.iconset/icon_512x512@2x.png
          iconutil -c icns iconset.iconset -o icon/icon.icns

      - name: Run jpackage (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p installer
          jpackage \
            --input dist \
            --dest installer \
            --name Counselor \
            --main-jar PbmCounselor.jar \
            --main-class client.Main \
            --type msi \
            --java-options "-Dclash.distro=msi" \
            --app-version "$APP_VERSION" \
            --vendor "Clash of Legends" \
            --add-modules java.desktop,java.sql,java.xml,java.naming,java.logging,java.management,jdk.unsupported,jdk.crypto.ec \
            --java-options '-splash:$APPDIR/teaser_whs01.png' \
            --java-options -Xmx2048M \
            --java-options "-Dsun.java2d.d3d=false" \
            --java-options "-Dsun.java2d.noddraw=true" \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.text=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED" \
            --icon icon/icon.${{ matrix.icon-ext }} \
            --file-associations jpackage/file-associations.properties \
            --win-dir-chooser \
            --win-shortcut

      - name: Run jpackage app-image (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p appimage
          jpackage \
            --input dist \
            --dest appimage \
            --name Counselor \
            --main-jar PbmCounselor.jar \
            --main-class client.Main \
            --type app-image \
            --java-options "-Dclash.distro=windows-portable" \
            --app-version "$APP_VERSION" \
            --vendor "Clash of Legends" \
            --add-modules java.desktop,java.sql,java.xml,java.naming,java.logging,java.management,jdk.unsupported,jdk.crypto.ec \
            --java-options '-splash:$APPDIR/teaser_whs01.png' \
            --java-options -Xmx2048M \
            --java-options "-Dsun.java2d.d3d=false" \
            --java-options "-Dsun.java2d.noddraw=true" \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.text=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED" \
            --icon icon/icon.ico

      - name: ZIP app-image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path appimage/Counselor -DestinationPath "installer/Counselor-windows-portable-$env:APP_VERSION.zip"

      - name: Run jpackage (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p installer
          jpackage \
            --input dist \
            --dest installer \
            --name Counselor \
            --main-jar PbmCounselor.jar \
            --main-class client.Main \
            --type ${{ matrix.pkg-type }} \
            --java-options "-Dclash.distro=${{ matrix.pkg-type }}" \
            --app-version "$APP_VERSION" \
            --vendor "Clash of Legends" \
            --add-modules java.desktop,java.sql,java.xml,java.naming,java.logging,java.management,jdk.unsupported,jdk.crypto.ec \
            --java-options '-splash:$APPDIR/teaser_whs01.png' \
            --java-options -Xmx2048M \
            --java-options "--add-opens=java.base/java.util=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.text=ALL-UNNAMED" \
            --java-options "--add-opens=java.base/java.util.concurrent=ALL-UNNAMED" \
            --icon icon/icon.${{ matrix.icon-ext }} \
            --file-associations jpackage/file-associations.properties

      - name: Label macOS DMG by architecture
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Both the Apple-Silicon (macos-latest) and Intel (macos-13) runners emit
          # Counselor-${APP_VERSION}.dmg. Rename by arch so the release assets don't collide.
          if [ "$(uname -m)" = "arm64" ]; then LABEL=apple-silicon; else LABEL=intel; fi
          mv "installer/Counselor-${APP_VERSION}.dmg" "installer/Counselor-${APP_VERSION}-${LABEL}.dmg"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: installer/
          # This artifact is only the build->release cross-job hand-off; the release page keeps the
          # installers permanently as release assets. Keep it 1 day so it does not accrue against the
          # Actions storage quota (hit 2026-07-18; ~150 MB per tagged release across the 3 platforms).
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNSELOR_VER=$(cat installers/counselor_version.txt 2>/dev/null || echo "$GITHUB_REF_NAME")
          rm -f installers/counselor_version.txt
          gh release create "$GITHUB_REF_NAME" \
            installers/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Counselor $COUNSELOR_VER"

  # Persist the shipped build number so the next release gets a fresh one.
  # The Ant build increments the workspace copy of version_counselor.properties (+1 over the
  # committed value) but never pushes it back; without this job two releases cut from the same
  # committed base ship with identical build numbers (e.g. v2.0.6 and v2.0.7 both as 2.860).
  bump-build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Commit shipped build number to master
        run: |
          OLD=$(grep '^BUILD=' src/version_counselor.properties | cut -d= -f2 | tr -d '[:space:]')
          NEW=$((OLD + 1))
          sed -i "s/^BUILD=.*/BUILD=${NEW}/" src/version_counselor.properties
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Build 2.${NEW} shipped in ${GITHUB_REF_NAME} [skip ci]"
          git push
